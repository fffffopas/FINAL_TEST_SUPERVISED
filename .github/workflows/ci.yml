name: API CI/CD

on:
  push:
    branches: ["main"]
    tags: ["v*.*"]
  pull_request:
    branches: ["main"]


jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Скачиваем код репозитория
        uses: actions/checkout@v6

      - name: Устанавливаем Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Устанавливаем зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Проверка кода линтером (Ruff)
        run: ruff check .

      - name: Запуск автотестов (Pytest)
        run: pytest

  build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Скачиваем код
        uses: actions/checkout@v6

      - name: Извлечение метаданных образа Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKER_USERNAME }}/predictor-api

      - name: Аутентификация в реестре
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v4

      - run: echo "len=${#DOCKER_USERNAME}"
        env:
          DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}

      - name: Сборка и отправка образа
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}